<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light" />
    <meta
      name="description"
      content="Play crosswords in your browser."
    />
    <title>Crosswords</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Crosswords home">Crosswords</a>
    </header>

    <main>
      <section class="welcome" id="welcome">
        <section class="puzzle-library" aria-labelledby="puzzle-library-title">
          <div class="library-heading">
            <h1 id="puzzle-library-title">Puzzles</h1>
            <p id="library-status" aria-live="polite">Loading puzzles…</p>
          </div>
          <div class="puzzle-cards" id="puzzle-list"></div>
        </section>
      </section>

      <section class="solver" id="solver" hidden>
        <div class="puzzle-heading">
          <div>
            <p class="eyebrow">CROSSWORD</p>
            <h1 id="puzzle-title">Untitled Crossword</h1>
            <p class="byline" id="puzzle-author"></p>
          </div>
          <div class="puzzle-actions">
            <button class="button button-quiet" id="gallery-button" type="button">
              <span class="wide-label">All puzzles</span>
              <span class="narrow-label">Puzzles</span>
            </button>
            <div class="timer" id="timer" aria-label="Elapsed time">0:00</div>
            <button class="button button-quiet" id="check-button" type="button">
              Check
            </button>
            <button class="button button-quiet" id="reveal-button" type="button">
              <span class="wide-label">Reveal word</span>
              <span class="narrow-label">Reveal</span>
            </button>
            <button class="button button-quiet" id="reset-button" type="button">
              Reset
            </button>
          </div>
        </div>

        <div class="solver-layout">
          <div class="board-column">
            <div
              class="grid"
              id="grid"
              role="grid"
              aria-label="Crossword grid"
              tabindex="0"
            ></div>
            <input
              class="keyboard-input"
              id="keyboard-input"
              type="text"
              inputmode="text"
              autocomplete="off"
              autocapitalize="characters"
              autocorrect="off"
              enterkeyhint="next"
              spellcheck="false"
              aria-label="Crossword letter input"
            />
            <div class="current-clue" id="current-clue" aria-live="polite"></div>
            <p class="keyboard-help">
              Arrow keys move · Space or Enter changes direction · Tab skips clues
            </p>
          </div>

          <aside class="clues" aria-label="Crossword clues">
            <section class="clue-section">
              <h2>Across</h2>
              <ol class="clue-list" id="across-clues"></ol>
            </section>
            <section class="clue-section">
              <h2>Down</h2>
              <ol class="clue-list" id="down-clues"></ol>
            </section>
          </aside>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="puz.js"></script>
    <script src="app.js"></script>
  </body>
</html>
